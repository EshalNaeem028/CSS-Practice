<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS-Positioning Practice </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1> CSS Positioning </h1>
<section class="position-demo">
    <h2> position : static </h2>
    <div class="container">
    <div class="box static-box">Static </div>
    </div>

</section>

<section class="position-demo">
    <h2> position : relative </h2>
    <div class="container">
        <div class="box relative-box">Relative </div>
    </div>

</section>

<section class="position-demo">
    <h2> position : fixed </h2>
    <div class="container">
        <div class="box fixed-box">Fixed </div>
    </div>

</section>

<section class="position-demo">
    <h2> position : absolute </h2>
    <div class="container">
        <div class="box absolute-box">Absolute </div>
    </div>

</section>


</body>
</html>
