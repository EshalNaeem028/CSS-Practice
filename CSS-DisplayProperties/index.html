<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Display Properties</title>
    <link rel="stylesheet" href="style.css">
</head>

<h1>Display Properties </h1>

<section class="display-demo">
    <h2> display:block</h2>
    <div class="block-box">BOX 1</div>
    <div class="block-box">BOX 2</div>
    <div class="block-box">BOX 3</div>
</section>


<section class="display-demo">
    <h2> display:inline</h2>
    <span class="inline-block">BOX 1</span>
    <span class="inline-block">BOX 2</span>
    <span class="inline-block">BOX 3</span>
</section>

<section class="display-demo">
    <h2>display: inline-block-box</h2>
    <div class="inline-block-box">Box 1</div>
    <div class="inline-block-box">Box 2</div>
    <div class="inline-block-box">Box 3</div>
</section>

<section class="display-demo">
    <h2> display:none</h2>
    <div class="box">Visible</div>
    <div class="hidden-box">Hidden</div>
    <div class="box">Visible </div>
</section>

<section class="display-demo">
    <h2> display:flex</h2>
    <div class="flex-container">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
    </div>
</section>

<section class="display-demo">
    <h2> display: grid</h2>
    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
    </div>
</section>


</body>
</html>
